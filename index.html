<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090B">
<title>Plan Flexible</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090B;
    --surface: #111113;
    --border: #18181B;
    --border-hover: #27272A;
    --text: #E4E4E7;
    --text-dim: #A1A1AA;
    --text-muted: #71717A;
    --text-faint: #52525B;
    --text-ghost: #3F3F46;
    --green: #22C55E;
    --green-dim: #4ADE80;
    --green-bg: #09120D;
    --green-border: #14532D40;
    --red: #EF4444;
    --red-light: #F87171;
    --red-bg: #170E0E;
    --red-border: #7F1D1D30;
    --yellow: #EAB308;
    --orange: #F97316;
    --blue: #3B82F6;
    --purple: #8B5CF6;
    --indigo: #818CF8;
    --font: 'DM Sans', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  .app {
    max-width: 500px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }

  /* Header */
  .header h1 {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .header p { font-size: 12px; color: var(--text-faint); margin-top: 4px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 20px 0; }
  .stat {
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 10px;
    border: 1px solid var(--border);
  }
  .stat-label { font-size: 10px; color: var(--text-faint); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
  .stat-val { font-size: 18px; font-weight: 700; color: #fff; margin-top: 3px; font-family: var(--mono); }
  .stat-sub { font-size: 10px; color: var(--text-ghost); margin-top: 1px; }

  /* Week selector */
  .weeks { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .week-btn {
    padding: 8px 14px; border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-faint);
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font);
    transition: all 0.15s;
  }
  .week-btn.active { border-color: var(--text-ghost); background: var(--border); color: #fff; }
  .week-add {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px dashed var(--border-hover); background: transparent;
    color: var(--text-faint); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* Tabs */
  .tabs { display: flex; gap: 3px; margin-bottom: 18px; background: var(--surface); border-radius: 9px; padding: 3px; }
  .tab {
    flex: 1; padding: 9px 0; border-radius: 7px; border: none;
    background: transparent; color: var(--text-faint);
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font);
    transition: all 0.15s;
  }
  .tab.active { background: var(--border-hover); color: #fff; }

  /* Day rows */
  .day-row {
    display: grid;
    grid-template-columns: 42px 1fr auto 36px;
    align-items: center;
    gap: 8px;
    padding: 11px 12px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 5px;
  }
  .day-row.open { border-radius: 10px 10px 0 0; border-color: var(--border-hover); border-bottom: none; }
  .day-row.done { background: var(--green-bg); border-color: var(--green-border); }
  .day-label { font-size: 12px; font-weight: 700; color: var(--text-ghost); text-align: center; font-family: var(--mono); }
  .day-workout { font-size: 14px; font-weight: 600; color: #D4D4D8; display: flex; align-items: center; gap: 6px; }
  .day-workout.done-text { color: var(--green-dim); }
  .day-meta { font-size: 11px; color: var(--text-ghost); margin-top: 1px; }
  .day-steps { font-size: 11px; color: var(--text-ghost); font-family: var(--mono); }
  .day-empty { font-size: 13px; color: var(--border-hover); font-style: italic; }

  .check-btn {
    width: 30px; height: 30px; border-radius: 7px;
    border: 2px solid var(--border-hover);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #fff; transition: all 0.2s;
  }
  .check-btn.checked { border: none; background: var(--green); }

  /* Panels */
  .panel {
    background: #0E0E10;
    border-radius: 0 0 10px 10px;
    border: 1px solid var(--border-hover);
    border-top: none;
    padding: 14px;
    margin-bottom: 5px;
  }
  .panel-label { font-size: 10px; color: var(--text-faint); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

  /* Picker grid */
  .picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .picker-btn {
    padding: 10px 8px; border-radius: 8px;
    border: 1px solid #1E1E22; background: #0C0C0E;
    cursor: pointer; text-align: left; transition: all 0.15s;
    font-family: var(--font);
  }
  .picker-btn:active { background: #161618; }
  .picker-btn .icon { font-size: 14px; }
  .picker-btn .name { font-size: 12px; font-weight: 600; color: #D4D4D8; }
  .picker-btn .dur { font-size: 10px; color: var(--text-ghost); }
  .picker-rest {
    padding: 10px 8px; border-radius: 8px;
    border: 1px dashed var(--border-hover); background: transparent;
    cursor: pointer; grid-column: 1 / -1; text-align: center;
    font-size: 12px; color: var(--text-ghost); font-family: var(--font);
  }

  /* Exercise list */
  .ex-row {
    font-size: 13px; color: var(--text-dim); padding: 4px 0;
    display: flex; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .ex-row:last-child { border-bottom: none; }
  .ex-reps { color: var(--text-faint); font-family: var(--mono); font-size: 12px; }

  /* Inputs */
  .input {
    width: 100%; padding: 8px 10px; border-radius: 7px;
    border: 1px solid var(--border-hover); background: var(--bg);
    color: #fff; font-size: 14px; font-family: var(--mono);
    outline: none;
  }
  .input-text {
    width: 100%; padding: 8px 10px; border-radius: 7px;
    border: 1px solid var(--border-hover); background: var(--bg);
    color: var(--text-dim); font-size: 12px; font-family: var(--font);
    outline: none;
  }
  .input-big {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--border-hover); background: var(--bg);
    color: #fff; font-size: 20px; font-family: var(--mono);
    outline: none;
  }
  .field-label { font-size: 10px; color: var(--text-faint); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }

  /* Feelings */
  .feeling-grid { display: flex; gap: 4px; }
  .feeling-btn {
    flex: 1; padding: 6px 0; border-radius: 7px;
    border: 1px solid var(--border); background: var(--bg);
    font-size: 15px; cursor: pointer; transition: all 0.15s;
  }
  .feeling-btn.selected { border-color: var(--text-ghost); background: #1C1C1E; }

  /* Action buttons */
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn-change {
    flex: 1; padding: 8px; border-radius: 7px;
    border: 1px solid var(--border-hover); background: var(--surface);
    color: var(--text-muted); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: var(--font);
  }
  .btn-remove {
    padding: 8px 14px; border-radius: 7px;
    border: 1px solid #2D1515; background: var(--red-bg);
    color: var(--red-light); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: var(--font);
  }
  .btn-reset {
    padding: 10px 16px; border-radius: 7px;
    border: 1px solid #2D1515; background: var(--red-bg);
    color: var(--red-light); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: var(--font);
  }
  .btn-export {
    width: 100%; padding: 14px; border-radius: 8px; border: none;
    background: linear-gradient(135deg, var(--indigo), #6366F1);
    color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: var(--font);
    transition: all 0.3s; margin-bottom: 14px;
  }
  .btn-export.copied { background: var(--green); }

  /* Block cards */
  .block-card {
    background: var(--surface); border-radius: 10px;
    padding: 14px 16px; border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .block-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .block-icon { font-size: 18px; }
  .block-name { font-size: 14px; font-weight: 700; color: #fff; }
  .block-dur { font-size: 11px; color: var(--text-ghost); }
  .block-desc { font-size: 12px; color: var(--text-faint); margin-bottom: 8px; }
  .block-ex { font-size: 12px; color: var(--text-muted); padding: 3px 0; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .block-ex:last-child { border-bottom: none; }

  /* Weight */
  .weight-card {
    background: var(--surface); border-radius: 10px;
    padding: 20px; border: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .weight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: end; }
  .weight-start { font-size: 28px; font-weight: 700; color: #fff; font-family: var(--mono); }
  .weight-unit { font-size: 13px; color: var(--text-ghost); }
  .weight-diff {
    margin-top: 16px; padding: 10px 14px; border-radius: 8px;
    font-size: 14px; font-weight: 600;
  }
  .weight-diff.loss { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green-dim); }
  .weight-diff.gain { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red-light); }
  .weight-diff .note { font-size: 11px; font-weight: 400; color: var(--text-ghost); margin-left: 8px; }

  /* Export */
  .export-preview {
    background: var(--bg); border-radius: 8px; padding: 14px;
    border: 1px solid var(--border);
    max-height: 300px; overflow-y: auto;
  }
  .export-preview pre {
    font-size: 11px; color: var(--text-muted); margin: 0;
    font-family: var(--mono); white-space: pre-wrap; word-break: break-word;
    line-height: 1.6;
  }
  .howto {
    background: #0F1A2E; border-radius: 10px; padding: 14px 16px;
    border: 1px solid #1E2545; margin-top: 14px;
  }
  .howto-title { font-size: 12px; color: var(--indigo); font-weight: 600; margin-bottom: 4px; }
  .howto-text { font-size: 11px; color: var(--text-ghost); line-height: 1.6; white-space: pre-line; }

  /* Footer */
  .footer {
    margin-top: 28px; padding: 12px 14px; border-radius: 10px;
    background: linear-gradient(135deg, #111127, #0F1A2E);
    border: 1px solid #1E2545; text-align: center;
  }
  .footer-main { font-size: 12px; color: var(--indigo); font-weight: 600; }
  .footer-sub { font-size: 10px; color: var(--text-ghost); margin-top: 3px; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #0D0D0F;
    border-top: 1px solid var(--border);
    display: flex; justify-content: center;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .bottom-nav-inner { display: flex; gap: 4px; max-width: 500px; width: 100%; padding: 0 12px; }
  .nav-btn {
    flex: 1; padding: 8px 0; border-radius: 8px; border: none;
    background: transparent; color: var(--text-faint);
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: all 0.15s;
  }
  .nav-btn.active { color: var(--indigo); }
  .nav-icon { font-size: 18px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .panel { animation: fadeIn 0.15s ease-out; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }
</style>
</head>
<body>

<div class="app" id="app"></div>
<div class="bottom-nav">
  <div class="bottom-nav-inner" id="nav"></div>
</div>

<script>
const STORAGE_KEY = 'fitness-flex-v4';

const BLOCKS = [
  { id:'fullbody', label:'Full Body', icon:'🔴', color:'#EF4444', duration:'20 min', desc:'Flexiones, sentadillas, abdominales, plancha', exercises:[{name:'Flexiones',reps:'12–14'},{name:'Sentadillas',reps:'15–18'},{name:'Abdominales',reps:'20–25'},{name:'Plancha',reps:'30–35s'}], rounds:'2–3 rondas' },
  { id:'variacion', label:'Variación', icon:'🟠', color:'#F97316', duration:'20 min', desc:'Flexiones lentas, sentadillas c/pausa, zancadas, plancha lateral', exercises:[{name:'Flexiones lentas',reps:'10–12'},{name:'Sentadillas c/pausa',reps:'12–15'},{name:'Zancadas/pierna',reps:'12'},{name:'Plancha lateral/lado',reps:'20–30s'}], rounds:'2–3 rondas' },
  { id:'fuerza', label:'Día Fuerte', icon:'🟢', color:'#22C55E', duration:'30–40 min', desc:'Fuerza completa: flexiones, sentadillas, zancadas, plancha', exercises:[{name:'Flexiones',reps:'12–15'},{name:'Sentadillas',reps:'15–20'},{name:'Zancadas/pierna',reps:'10–12'},{name:'Plancha',reps:'30–40s'}], rounds:'3–4 rondas' },
  { id:'futbol', label:'Fútbol 7', icon:'⚽', color:'#EAB308', duration:'60–90 min', desc:'Liga — cuenta como HIIT/cardio', exercises:[{name:'Partido completo',reps:'—'}], rounds:'Cardio semanal' },
  { id:'hiit', label:'HIIT', icon:'🟡', color:'#EAB308', duration:'20–25 min', desc:'Jumping jacks, mountain climbers, burpees + core', exercises:[{name:'Jumping jacks',reps:'30s'},{name:'Mountain climbers',reps:'30s'},{name:'Burpees',reps:'20–30s'},{name:'Descanso',reps:'30–40s'},{name:'Abdominales',reps:'15–20'},{name:'Plancha',reps:'20–30s'}], rounds:'3–4 rondas' },
  { id:'caminar', label:'Caminar', icon:'🚶', color:'#3B82F6', duration:'20–30 min', desc:'Caminata activa, recuperación', exercises:[{name:'Caminata suave/activa',reps:'20–30 min'}], rounds:'' },
  { id:'libre', label:'Mov. Libre', icon:'🏃', color:'#8B5CF6', duration:'—', desc:'Deporte, bici, lo que sea', exercises:[{name:'Actividad a elección',reps:'—'}], rounds:'' },
];

const DAYS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const FEELINGS = ['😵','😐','💪','🔥'];

function defaultDay(workout) { return { workout: workout||null, completed:false, steps:'', feeling:'', notes:'' }; }
function defaultWeek() {
  return { days: {
    1: defaultDay('fullbody'), 2: defaultDay('variacion'), 3: defaultDay('futbol'),
    4: defaultDay('fuerza'), 5: defaultDay('caminar'), 6: defaultDay('libre'), 7: defaultDay(null)
  }};
}
function defaultState() { return { weeks:{1:defaultWeek(),2:defaultWeek()}, weight:{start:76.3,current:''} }; }

function getBlock(id) { return BLOCKS.find(b => b.id === id); }

// State
let data = defaultState();
let currentWeek = 1;
let activeDay = null;
let picking = null;
let view = 'tracker';
let copied = false;

// Load
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) data = JSON.parse(raw);
  } catch(e) { console.error('Load error', e); }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch(e) { console.error('Save error', e); }
}

// Helpers
function weekStats(wk) {
  const w = data.weeks[wk];
  const completed = Object.values(w.days).filter(d => d.completed).length;
  const assigned = Object.values(w.days).filter(d => d.workout).length;
  const stepsArr = Object.values(w.days).map(d => Number(d.steps)).filter(s => s > 0);
  const avgSteps = stepsArr.length ? Math.round(stepsArr.reduce((a,b)=>a+b,0)/stepsArr.length) : 0;
  return { completed, assigned, avgSteps };
}

function weightDiff() {
  if (!data.weight.current) return null;
  return (Number(data.weight.current) - data.weight.start).toFixed(1);
}

function generateSummary() {
  const lines = ['=== RESUMEN PLAN FLEXIBLE ==='];
  lines.push(`Peso inicio: ${data.weight.start} kg`);
  lines.push(`Peso actual: ${data.weight.current || 'no registrado'}`);
  const wd = weightDiff();
  if (wd) lines.push(`Cambio: ${Number(wd)>0?'+':''}${wd} kg`);
  lines.push('');
  Object.keys(data.weeks).sort((a,b)=>Number(a)-Number(b)).forEach(wk => {
    const w = data.weeks[wk];
    const s = weekStats(wk);
    lines.push(`--- SEMANA ${wk} ---`);
    lines.push(`Completados: ${s.completed}/${s.assigned}`);
    if (s.avgSteps > 0) lines.push(`Pasos promedio: ${s.avgSteps.toLocaleString()}`);
    for (let day = 1; day <= 7; day++) {
      const d = w.days[day];
      if (!d.workout && !d.steps && !d.notes) continue;
      const block = d.workout ? getBlock(d.workout) : null;
      let line = `  ${DAYS[day-1]}: `;
      line += block ? `${block.label} ${d.completed?'✓':'✗'}` : 'Descanso';
      if (d.steps) line += ` | ${Number(d.steps).toLocaleString()} pasos`;
      if (d.feeling) line += ` | ${d.feeling}`;
      if (d.notes) line += ` | "${d.notes}"`;
      lines.push(line);
    }
    lines.push('');
  });
  lines.push('=== FIN RESUMEN ===');
  lines.push('(Pega esto en el chat de Claude para que arme las próximas semanas)');
  return lines.join('\n');
}

// Render
function render() {
  const app = document.getElementById('app');
  const s = weekStats(currentWeek);
  const wd = weightDiff();
  const weekData = data.weeks[currentWeek];

  let html = '';

  // Header
  html += `<div class="header" style="margin-bottom:20px">
    <h1>PLAN FLEXIBLE</h1>
    <p>Asigna bloques a los días que quieras</p>
  </div>`;

  // Week selector
  html += '<div class="weeks">';
  Object.keys(data.weeks).forEach(w => {
    html += `<button class="week-btn ${Number(w)===currentWeek?'active':''}" onclick="selectWeek(${w})">Sem ${w}</button>`;
  });
  html += `<button class="week-add" onclick="addWeek()">+</button>`;
  html += '</div>';

  // Stats
  html += '<div class="stats">';
  html += `<div class="stat"><div class="stat-label">Hechos</div><div class="stat-val">${s.completed}/${s.assigned||'—'}</div><div class="stat-sub">esta semana</div></div>`;
  html += `<div class="stat"><div class="stat-label">Pasos Ø</div><div class="stat-val">${s.avgSteps>0?s.avgSteps.toLocaleString():'—'}</div><div class="stat-sub">${s.avgSteps>=7000?'✓ meta':'meta 7k'}</div></div>`;
  html += `<div class="stat"><div class="stat-label">Peso</div><div class="stat-val">${data.weight.current||'—'}</div><div class="stat-sub">${wd?`${Number(wd)>0?'+':''}${wd} kg`:'registrar'}</div></div>`;
  html += '</div>';

  // Views
  if (view === 'tracker') html += renderTracker(weekData);
  else if (view === 'blocks') html += renderBlocks();
  else if (view === 'peso') html += renderWeight(wd);
  else if (view === 'export') html += renderExport();

  // Footer
  html += `<div class="footer">
    <div class="footer-main">Constancia > Intensidad</div>
    <div class="footer-sub">Fútbol miércoles = cardio ✓ · Si todo falla → camina + día fuerte</div>
  </div>`;

  app.innerHTML = html;
  renderNav();
}

function renderTracker(weekData) {
  let html = '';
  for (let day = 1; day <= 7; day++) {
    const d = weekData.days[day];
    const block = d.workout ? getBlock(d.workout) : null;
    const key = `${currentWeek}-${day}`;
    const isActive = activeDay === key;
    const isPicking = picking === key;
    const isOpen = isActive || isPicking;

    html += `<div class="day-row ${isOpen?'open':''} ${d.completed?'done':''}" onclick="dayClick(${day})">`;
    html += `<div class="day-label">${DAYS[day-1]}</div>`;
    if (block) {
      html += `<div><div class="day-workout ${d.completed?'done-text':''}">${block.icon} ${block.label}</div>
        <div class="day-meta">${block.duration}${block.rounds?' · '+block.rounds:''}</div></div>`;
      html += `<div class="day-steps">${d.steps?Number(d.steps).toLocaleString()+'👣':''}</div>`;
      html += `<button class="check-btn ${d.completed?'checked':''}" onclick="event.stopPropagation();toggleCheck(${day})">${d.completed?'✓':''}</button>`;
    } else {
      html += `<div class="day-empty">Toca para asignar...</div><div></div><div style="width:30px"></div>`;
    }
    html += '</div>';

    if (isPicking) {
      html += `<div class="panel"><div class="panel-label">Elegir bloque para ${DAYS[day-1]}</div><div class="picker-grid">`;
      BLOCKS.forEach(b => {
        html += `<button class="picker-btn" onclick="assignBlock(${day},'${b.id}')">
          <div><span class="icon">${b.icon}</span> <span class="name">${b.label}</span></div>
          <div class="dur">${b.duration}</div></button>`;
      });
      html += `<button class="picker-rest" onclick="assignBlock(${day},null)">Descanso (sin bloque)</button>`;
      html += '</div></div>';
    }

    if (isActive && block) {
      html += '<div class="panel">';
      // Exercises
      html += '<div class="panel-label">Ejercicios</div>';
      block.exercises.forEach(ex => {
        html += `<div class="ex-row"><span>${ex.name}</span><span class="ex-reps">${ex.reps}</span></div>`;
      });
      // Steps + feeling
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 10px">';
      html += `<div><div class="field-label">Pasos</div><input class="input" type="number" placeholder="7000" value="${d.steps}" oninput="updateField(${day},'steps',this.value)"></div>`;
      html += `<div><div class="field-label">Cómo fue</div><div class="feeling-grid">`;
      FEELINGS.forEach(f => {
        html += `<button class="feeling-btn ${d.feeling===f?'selected':''}" onclick="updateField(${day},'feeling','${f}')">${f}</button>`;
      });
      html += '</div></div></div>';
      // Notes
      html += `<div><div class="field-label">Notas</div><input class="input-text" type="text" placeholder="Ej: los burpees estuvieron heavy..." value="${escHtml(d.notes)}" oninput="updateField(${day},'notes',this.value)"></div>`;
      // Buttons
      html += `<div class="btn-row">
        <button class="btn-change" onclick="startPicking(${day})">Cambiar bloque</button>
        <button class="btn-remove" onclick="clearDay(${day})">Quitar</button>
      </div>`;
      html += '</div>';
    }
  }
  return html;
}

function renderBlocks() {
  let html = '<p style="font-size:12px;color:#3F3F46;margin:0 0 12px">Bloques disponibles. Asígnalos en la pestaña "Semana".</p>';
  BLOCKS.forEach(b => {
    html += `<div class="block-card">
      <div class="block-header"><span class="block-icon">${b.icon}</span><div><div class="block-name">${b.label}</div><div class="block-dur">${b.duration}${b.rounds?' · '+b.rounds:''}</div></div></div>
      <div class="block-desc">${b.desc}</div>`;
    b.exercises.forEach(ex => {
      html += `<div class="block-ex"><span>${ex.name}</span><span style="font-family:var(--mono);font-size:11px;color:var(--text-ghost)">${ex.reps}</span></div>`;
    });
    html += '</div>';
  });
  return html;
}

function renderWeight(wd) {
  let html = '<div class="weight-card">';
  html += '<div class="panel-label" style="margin-bottom:14px">Registro de peso</div>';
  html += '<div class="weight-grid"><div><div style="font-size:11px;color:#3F3F46;margin-bottom:4px">Inicio</div>';
  html += `<div class="weight-start">${data.weight.start}<span class="weight-unit"> kg</span></div></div>`;
  html += `<div><div style="font-size:11px;color:#3F3F46;margin-bottom:4px">Actual</div>`;
  html += `<input class="input-big" type="number" step="0.1" placeholder="75.5" value="${data.weight.current}" oninput="updateWeight(this.value)"></div></div>`;
  if (wd) {
    const loss = Number(wd) <= 0;
    html += `<div class="weight-diff ${loss?'loss':'gain'}">${loss?'↓':'↑'} ${Math.abs(Number(wd))} kg<span class="note">${loss?'Vas bien':'Normal al inicio'}</span></div>`;
  }
  html += '</div>';
  html += `<div style="background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border)">
    <button class="btn-reset" onclick="resetAll()">Resetear todo</button></div>`;
  return html;
}

function renderExport() {
  const summary = generateSummary();
  let html = `<div style="background:var(--surface);border-radius:10px;padding:20px;border:1px solid var(--border);margin-bottom:14px">
    <div class="panel-label" style="margin-bottom:6px">Exportar resumen</div>
    <p style="font-size:12px;color:var(--text-faint);margin:0 0 16px;line-height:1.5">Copia tu resumen y pégalo en el chat de Claude para que arme las próximas semanas.</p>
    <button class="btn-export ${copied?'copied':''}" onclick="exportSummary()">${copied?'✓ Copiado al portapapeles':'Copiar resumen'}</button>
    <div class="export-preview"><pre>${escHtml(summary)}</pre></div>
  </div>`;
  html += `<div class="howto"><div class="howto-title">¿Cómo usar?</div>
    <div class="howto-text">1. Registra tus datos durante las 2 semanas\n2. Toca "Copiar resumen"\n3. Abre un chat con Claude\n4. Pega el resumen y dile "arma las próximas 2 semanas"</div></div>`;
  return html;
}

function renderNav() {
  const tabs = [
    { k:'tracker', icon:'📋', l:'Semana' },
    { k:'blocks', icon:'🧱', l:'Bloques' },
    { k:'peso', icon:'⚖️', l:'Peso' },
    { k:'export', icon:'📤', l:'Exportar' },
  ];
  document.getElementById('nav').innerHTML = tabs.map(t =>
    `<button class="nav-btn ${view===t.k?'active':''}" onclick="switchView('${t.k}')">
      <span class="nav-icon">${t.icon}</span>${t.l}</button>`
  ).join('');
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Actions
function selectWeek(w) { currentWeek = Number(w); activeDay = null; picking = null; render(); }
function addWeek() {
  const next = Math.max(...Object.keys(data.weeks).map(Number)) + 1;
  data.weeks[next] = defaultWeek();
  save(); currentWeek = next; render();
}
function switchView(v) { view = v; activeDay = null; picking = null; render(); }

function dayClick(day) {
  const key = `${currentWeek}-${day}`;
  if (picking === key) { picking = null; render(); return; }
  const d = data.weeks[currentWeek].days[day];
  if (!d.workout) { picking = key; activeDay = null; }
  else { activeDay = activeDay === key ? null : key; picking = null; }
  render();
}

function toggleCheck(day) {
  data.weeks[currentWeek].days[day].completed = !data.weeks[currentWeek].days[day].completed;
  save(); render();
}

function assignBlock(day, blockId) {
  data.weeks[currentWeek].days[day].workout = blockId;
  data.weeks[currentWeek].days[day].completed = false;
  save(); picking = null; render();
}

function startPicking(day) {
  picking = `${currentWeek}-${day}`; activeDay = null; render();
}

function clearDay(day) {
  data.weeks[currentWeek].days[day] = defaultDay(null);
  save(); activeDay = null; render();
}

function updateField(day, field, value) {
  data.weeks[currentWeek].days[day][field] = value;
  save();
  // Don't re-render for inputs to avoid losing focus
}

function updateWeight(v) {
  data.weight.current = v;
  save();
}

function resetAll() {
  if (!confirm('¿Borrar todo y empezar de nuevo?')) return;
  data = defaultState();
  save(); currentWeek = 1; activeDay = null; picking = null; render();
}

async function exportSummary() {
  try {
    await navigator.clipboard.writeText(generateSummary());
    copied = true; render();
    setTimeout(() => { copied = false; render(); }, 2500);
  } catch {
    // Fallback: select the pre element
    const pre = document.querySelector('.export-preview pre');
    if (pre) {
      const range = document.createRange();
      range.selectNodeContents(pre);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  }
}

// Init
load();
render();

// Register service worker for offline + PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
